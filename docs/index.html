<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vérification BibTeX (HAL)</title>

<link rel="stylesheet" href="x2hal_utilities.css">
</head>

<body>

<h1>🔍 Vérificateur BibTeX pour x2HAL</h1>

<p>
Deux vérifications complémentaires :
<br>• structure du fichier
<br>• présence des champs obligatoires
</p>

<textarea id="input" placeholder="Collez votre BibTeX ici..."></textarea>

<div class="buttons">
    <button onclick="checkStructure()">Vérifier structure</button>
    <button onclick="checkFields()">Vérifier champs</button>
    <button onclick="clearAll()">Effacer</button>
</div>

<h3>Résultat :</h3>
<pre id="output"></pre>

<h3>Texte avec erreurs surlignées :</h3>
<pre id="highlighted"></pre>

<script src="structure_bib.js"></script>
<script src="champs_oblig_x2hal.js"></script>

<script>
function clearAll() {
    document.getElementById("input").value = "";
    document.getElementById("output").textContent = "";
    document.getElementById("highlighted").textContent = "";
}
</script>

</body>
</html>
